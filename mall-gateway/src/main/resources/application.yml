server:
  port: 8088

spring:
  application:
    name: mall-gateway
  main:
    web-application-type: reactive
  profiles:
    active: dev #默认为开发环境
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
  zipkin:
    base-url: ${ZIPKIN_BASE_URL:http://localhost:9411}
    sender:
      type: web
  sleuth:
    sampler:
      probability: 1.0

# jwt, secure(动态白名单) 以及 gateway routes 均已在 mall-common-dev.yaml 和 mall-gateway-dev.yaml 中配置