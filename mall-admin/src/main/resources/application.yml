spring:
  application:
    name: mall-admin
  profiles:
    active: dev #默认为开发环境
  servlet:
    multipart:
      enabled: true #开启文件上传
      max-file-size: 10MB #限制文件上传大小为10M
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848

# 以下配置已迁移至 Nacos
# mybatis, jwt, redis, secure, aliyun 均已在 mall-common-dev.yaml 和 mall-admin-dev.yaml 中配置
