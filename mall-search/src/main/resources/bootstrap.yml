spring:
  application:
    name: mall-search
  cloud:
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
        port: 8722
      eager: true
      datasource:
        search-flow-rules:
          nacos:
            server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
            namespace: dev
            data-id: mall-search-flow-rules
            group-id: SENTINEL_GROUP
            data-type: json
            rule-type: flow
    nacos:
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        file-extension: yaml
        namespace: dev # 请注意：如果 Nacos 中生成的命名空间 ID 是 UUID，这里需替换为真实 ID
        group: DEFAULT_GROUP
        shared-configs:
          - data-id: mall-common-dev.yaml
            group: DEFAULT_GROUP
            refresh: true
  profiles:
    active: dev
