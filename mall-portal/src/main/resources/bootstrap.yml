spring:
  application:
    name: mall-portal
  cloud:
    sentinel:
      transport:
        dashboard: localhost:8858
        port: 8720
      eager: true
      datasource:
        flow-rules:
          nacos:
            server-addr: 127.0.0.1:8848
            namespace: dev
            data-id: mall-portal-flow-rules
            group-id: SENTINEL_GROUP
            data-type: json
            rule-type: flow
        degrade-rules:
          nacos:
            server-addr: 127.0.0.1:8848
            namespace: dev
            data-id: mall-portal-degrade-rules
            group-id: SENTINEL_GROUP
            data-type: json
            rule-type: degrade
    nacos:
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        namespace: dev # 请注意：如果 Nacos 中生成的命名空间 ID 是 UUID，这里需替换为真实 ID
        group: DEFAULT_GROUP
        shared-configs:
          - data-id: mall-common-dev.yaml
            group: DEFAULT_GROUP
            refresh: true
  profiles:
    active: dev
